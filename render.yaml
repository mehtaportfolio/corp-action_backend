services:
  - type: web
    name: dividend-scraper
    env: node
    buildCommand: npm install
    startCommand: node master.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        sync: false
